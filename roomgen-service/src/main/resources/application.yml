spring:
  application:
    name: roomgen-service

server:
  port: 8080

aws:
  region: ${AWS_REGION:us-east-1}

bedrock:
  model-id: ${BEDROCK_MODEL_ID:us.stability.stable-image-inpaint-v1:0}
  seed: 42
  grow-mask: 15

downloader:
  max-bytes: 10485760
  connect-timeout-seconds: 5
  read-timeout-seconds: 15

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
