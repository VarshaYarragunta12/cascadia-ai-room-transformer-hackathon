<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoomGen — Local Test</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    header span {
      font-size: 11px;
      background: #1a3a2a;
      color: #4ade80;
      padding: 2px 8px;
      border-radius: 99px;
      border: 1px solid #2d6a4a;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      border-right: 1px solid #222;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 10px;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 13px; color: #aaa; }

    input[type="text"], textarea {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus { border-color: #4ade80; }
    textarea { resize: vertical; line-height: 1.5; }

    .divider { height: 1px; background: #222; }

    button#generate {
      width: 100%;
      padding: 11px;
      background: #4ade80;
      color: #0a1a0e;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    button#generate:hover { background: #22c55e; }
    button#generate:disabled { opacity: 0.45; cursor: not-allowed; }

    .api-note {
      font-size: 11px;
      color: #555;
      text-align: center;
    }
    .api-note code {
      color: #4ade80;
      font-family: monospace;
    }

    /* ── RIGHT PANEL ── */
    .panel-right {
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .images-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .image-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      overflow: hidden;
    }
    .image-card-header {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      border-bottom: 1px solid #1e1e1e;
    }
    .image-card-body {
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .image-card-body img {
      width: 100%;
      display: block;
      object-fit: contain;
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #333;
    }
    .placeholder svg { width: 40px; height: 40px; }
    .placeholder span { font-size: 13px; }

    /* Spinner */
    .spinner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2a2a2a;
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label { font-size: 13px; color: #aaa; }

    /* Error box */
    .error-box {
      background: #1f0a0a;
      border: 1px solid #5a1a1a;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      color: #f87171;
      display: none;
    }
    .error-box.visible { display: block; }

    /* Prompt preview */
    .prompt-preview {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      overflow: hidden;
      display: none;
    }
    .prompt-preview.visible { display: block; }
    .prompt-preview-header {
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .prompt-preview-body {
      padding: 14px;
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
      white-space: pre-wrap;
      font-family: monospace;
    }

    /* Download button */
    .download-btn {
      display: none;
      padding: 7px 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .download-btn:hover { border-color: #4ade80; color: #4ade80; }
    .download-btn.visible { display: inline-block; }

    /* Timer */
    #timer { font-size: 12px; color: #555; }
  </style>
</head>
<body>

<header>
  <h1>RoomGen</h1>
  <span>Local Test UI</span>
  <span style="margin-left:auto; color:#555; font-size:12px;" id="timer"></span>
</header>

<div class="layout">

  <!-- ── LEFT: FORM ── -->
  <div class="panel-left">

    <div>
      <div class="section-title">Room Image</div>
      <div class="field">
        <label>Image URL</label>
        <input type="text" id="roomImageUrl"
          value="https://images.unsplash.com/photo-1630699144919-681cf308ae82?w=1024"
          placeholder="https://..." />
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-title">User Requirement</div>
      <div class="field">
        <label>Free-text intent (highest priority)</label>
        <textarea id="userRequirement" rows="2">I want to furnish this empty living room with modern minimalist furniture and make it feel warm and inviting</textarea>
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-title">Preferences</div>
      <div class="field">
        <label>Room type</label>
        <input type="text" id="roomType" value="living room" />
      </div>
      <div class="field" style="margin-top:10px">
        <label>Style (comma-separated)</label>
        <input type="text" id="style" value="modern, minimalist, Scandinavian" />
      </div>
      <div class="field" style="margin-top:10px">
        <label>Vibe</label>
        <input type="text" id="vibe" value="cozy minimalist" />
      </div>
      <div class="field" style="margin-top:10px">
        <label>Colors (comma-separated)</label>
        <input type="text" id="colors" value="white, warm oak, beige, natural linen" />
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-title">Room Context</div>
      <div class="field">
        <label>Existing furniture (comma-separated)</label>
        <input type="text" id="existingFurniture" value="" />
      </div>
      <div class="field" style="margin-top:10px">
        <label>Issues to address (comma-separated)</label>
        <input type="text" id="issues" value="completely empty room, needs full furnishing" />
      </div>
    </div>

    <div class="divider"></div>

    <div>
      <div class="section-title">Scraped Products</div>
      <div class="field">
        <label>One product name per line</label>
        <textarea id="products" rows="5">Linen Sofa
Oak Coffee Table
Arco Floor Lamp
Jute Area Rug
Marble Side Table</textarea>
      </div>
    </div>

    <div class="divider"></div>

    <button id="generate" onclick="generate()">Generate Room</button>
    <p class="api-note">Calls <code>POST localhost:8080/api/v1/generate-room</code></p>

  </div>

  <!-- ── RIGHT: RESULTS ── -->
  <div class="panel-right">

    <div class="error-box" id="errorBox"></div>

    <div class="images-row">
      <div class="image-card">
        <div class="image-card-header">Before</div>
        <div class="image-card-body" id="beforeCard">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
            <span>Enter a URL and generate</span>
          </div>
        </div>
      </div>

      <div class="image-card">
        <div class="image-card-header" style="display:flex;justify-content:space-between;align-items:center">
          <span>After</span>
          <a class="download-btn" id="downloadBtn" download="generated-room.png">Download</a>
        </div>
        <div class="image-card-body" id="afterCard">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 5v14M5 12l7 7 7-7"/>
            </svg>
            <span>Generated image appears here</span>
          </div>
        </div>
      </div>
    </div>

    <div class="prompt-preview" id="promptPreview">
      <div class="prompt-preview-header">
        <span>Prompt sent to Bedrock</span>
      </div>
      <div class="prompt-preview-body" id="promptText"></div>
    </div>

  </div>
</div>

<script>
  let timerInterval = null;

  function val(id) {
    return document.getElementById(id).value.trim();
  }

  function splitCsv(str) {
    return str.split(',').map(s => s.trim()).filter(Boolean);
  }

  function buildPromptPreview(payload) {
    const room = payload.roomData;
    const prefs = payload.userPreferences;
    const products = payload.scrapedProducts;
    let parts = [];
    if (room.userRequirement) parts.push(room.userRequirement + '.');
    if (products.length) {
      parts.push(`Add to this ${room.roomType || 'room'}: ${products.map(p => p.name).join(', ')}.`);
    }
    const styleParts = [];
    if (prefs.style?.length) styleParts.push('Style: ' + prefs.style.join(', '));
    if (prefs.vibe) styleParts.push('vibe: ' + prefs.vibe);
    if (prefs.colors?.length) styleParts.push('colors: ' + prefs.colors.join(', '));
    if (styleParts.length) parts.push(styleParts.join('; ') + '.');
    if (room.existingFurniture?.length) parts.push('Preserve existing furniture: ' + room.existingFurniture.join(', ') + '.');
    if (room.issues?.length) parts.push('Address: ' + room.issues.join(', ') + '.');
    return parts.join('\n');
  }

  function buildPayload() {
    const productLines = val('products').split('\n').map(s => s.trim()).filter(Boolean);
    const scrapedProducts = productLines.map(name => ({ name, typeName: name }));

    return {
      userPreferences: {
        style:  splitCsv(val('style')),
        vibe:   val('vibe'),
        colors: splitCsv(val('colors')),
      },
      roomData: {
        roomImageUrl:      val('roomImageUrl'),
        roomType:          val('roomType'),
        existingFurniture: splitCsv(val('existingFurniture')),
        issues:            splitCsv(val('issues')),
        userRequirement:   val('userRequirement'),
      },
      scrapedProducts
    };
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.textContent = msg;
    box.classList.add('visible');
  }

  function clearError() {
    document.getElementById('errorBox').classList.remove('visible');
  }

  function setLoading(on) {
    const btn = document.getElementById('generate');
    const afterCard = document.getElementById('afterCard');
    btn.disabled = on;
    btn.textContent = on ? 'Generating…' : 'Generate Room';

    const existing = afterCard.querySelector('.spinner-overlay');
    if (on && !existing) {
      const overlay = document.createElement('div');
      overlay.className = 'spinner-overlay';
      overlay.innerHTML = `<div class="spinner"></div><span class="spinner-label">Calling Bedrock (~15–20s)</span>`;
      afterCard.appendChild(overlay);
    } else if (!on && existing) {
      existing.remove();
    }
  }

  function startTimer() {
    const el = document.getElementById('timer');
    let secs = 0;
    el.textContent = '';
    timerInterval = setInterval(() => {
      secs++;
      el.textContent = `${secs}s`;
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
  }

  async function generate() {
    clearError();
    const payload = buildPayload();

    if (!payload.roomData.roomImageUrl) {
      showError('Room Image URL is required.');
      return;
    }

    // Show before image
    const beforeCard = document.getElementById('beforeCard');
    beforeCard.innerHTML = `<img src="${payload.roomData.roomImageUrl}" alt="Before" onerror="this.style.display='none'" />`;

    // Show prompt preview
    const preview = document.getElementById('promptPreview');
    document.getElementById('promptText').textContent = buildPromptPreview(payload);
    preview.classList.add('visible');

    setLoading(true);
    startTimer();

    try {
      const res = await fetch('http://localhost:8080/api/v1/generate-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ message: res.statusText }));
        throw new Error(`${res.status} — ${err.message || JSON.stringify(err)}`);
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);

      const afterCard = document.getElementById('afterCard');
      afterCard.innerHTML = `<img src="${url}" alt="Generated room" />`;

      const dlBtn = document.getElementById('downloadBtn');
      dlBtn.href = url;
      dlBtn.classList.add('visible');

    } catch (err) {
      showError(err.message || String(err));
    } finally {
      setLoading(false);
      stopTimer();
    }
  }
</script>
</body>
</html>
